services:
  # ===== PostgreSQL with pgvector =====
  db:
    image: pgvector/pgvector:pg16
    container_name: legora-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legora_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-legora_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legora} -d ${POSTGRES_DB:-legora_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legora-network

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: legora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legora-network

  # ===== MinIO (S3-Compatible Storage) =====
  minio:
    image: minio/minio:latest
    container_name: legora-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-legora_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-legora_minio_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legora-network

  # ===== MinIO Setup (Create default bucket) =====
  minio-setup:
    image: minio/mc:latest
    container_name: legora-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set legora http://minio:9000 $${MINIO_ROOT_USER:-legora_minio} $${MINIO_ROOT_PASSWORD:-legora_minio_password};
      mc mb --ignore-existing legora/${MINIO_BUCKET:-legora-documents};
      exit 0;
      "
    networks:
      - legora-network

  # ===== FastAPI Backend =====
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: legora-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-legora}:${POSTGRES_PASSWORD:-legora_dev_password}@db:5432/${POSTGRES_DB:-legora_db}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/api/src:/app/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - legora-network

  # ===== Next.js Frontend =====
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: legora-web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/web/src:/app/src
      - ../../apps/web/public:/app/public
    depends_on:
      - api
    networks:
      - legora-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  legora-network:
    driver: bridge
